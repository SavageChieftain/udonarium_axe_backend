services:
  app:
    build: .
    ports:
      - "3000:80"
    volumes:
      # ソースコードをマウント（ホットリロード対応）
      - .:/var/www/html
    environment:
      # .env ファイルから読み込む（compose の env_file とは別に PHP 側で読む）
      APACHE_LOG_DIR: /var/log/apache2
    # 起動時に composer install を実行してから Apache を起動する
    command: >-
      bash -c "composer install --no-interaction --quiet && apache2-foreground"
