name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ["8.3", "8.4", "8.5"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pcov
          coverage: pcov

      - name: Install dependencies
        run: composer update --no-interaction --prefer-dist

      - name: PHP-CS-Fixer
        run: vendor/bin/php-cs-fixer check --diff --format=checkstyle | vendor/bin/cs2pr

      - name: PHPStan
        run: vendor/bin/phpstan analyse --memory-limit=256M --error-format=github

      - uses: mheap/phpunit-matcher-action@v1

      - name: PHPUnit with coverage
        run: vendor/bin/phpunit --coverage-text --coverage-clover=coverage.xml --display-deprecations

      - uses: codecov/codecov-action@v6
        if: matrix.php == '8.5'
        with:
          files: coverage.xml
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  release:
    name: Release
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Build release archive
        run: |
          mkdir -p dist
          zip -r dist/udonarium-axe-backend.zip \
            index.php \
            .htaccess \
            .env.example \
            src/ \
            docs/ \
            LICENSE \
            README.md \
            CHANGELOG.md \
            CONTRIBUTING.md

      - name: Install dependencies
        run: npm ci

      - name: Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
